name: Release — macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64-apple-darwin
            runner: macos-latest
          - arch: x86_64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.4'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.arch }}

      - name: Collect artifacts
        id: artifacts
        run: |
          DMG=$(find src-tauri/target/${{ matrix.arch }}/release/bundle/dmg -name '*.dmg' | head -1)
          echo "dmg=$DMG" >> $GITHUB_OUTPUT
          echo "Found: $DMG"

      - name: Upload to GitHub Release
        run: |
          # Create release if it doesn't exist yet, then upload the artifact
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --prerelease \
            --notes "" \
            --repo "${{ github.repository }}" 2>/dev/null || true
          gh release upload "${{ github.ref_name }}" \
            "${{ steps.artifacts.outputs.dmg }}" \
            --clobber \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
